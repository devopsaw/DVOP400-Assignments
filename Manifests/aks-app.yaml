apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-app-deployment
spec:
  selector:
    matchLabels:
      app: devopsaw-app
  replicas: 2
  template:
    metadata:
      labels:
        app: devopsaw-app
    spec:
      containers:
      - name: aks-app-container
        image: ://microsoft.com
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: aks-app-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: devopsaw-app
